<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - Plant AI</title>

<link rel="stylesheet" href="css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
.register-container{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#14532d,#065f46);
}

.register-box{
width:450px;
padding:40px;
background:rgba(255,255,255,.15);
backdrop-filter:blur(15px);
border-radius:20px;
box-shadow:0 0 30px rgba(0,0,0,.4);
}

.register-box h1{
text-align:center;
margin-bottom:30px;
}

.register-box input{
width:100%;
padding:15px;
margin-bottom:20px;
border:none;
border-radius:10px;
font-size:16px;
}

.register-box button{
width:100%;
padding:15px;
border:none;
border-radius:30px;
background:#22c55e;
color:#fff;
font-size:18px;
cursor:pointer;
}

.register-box button:hover{
background:#16a34a;
}

.register-box p{
margin-top:20px;
text-align:center;
}

.register-box a{
color:#22c55e;
text-decoration:none;
font-weight:bold;
}
</style>

</head>

<body>

<div class="register-container">

<div class="register-box">

<h1>🌱 Register</h1>

<input type="text" placeholder="Full Name">

<input type="email" placeholder="Email">

<input type="password" placeholder="Password">

<input type="password" placeholder="Confirm Password">

<button onclick="window.location='login.html'">
Create Account
</button>

<p>
Already have an account?
<a href="login.html">Login</a>
</p>

</div>

</div>

</body>
</html>
