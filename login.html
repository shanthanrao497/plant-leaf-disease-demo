<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Plant AI</title>

<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#14532d,#065f46);
}

.login-container{
width:100%;
display:flex;
justify-content:center;
align-items:center;
}

.login-box{
width:420px;
padding:40px;
background:rgba(255,255,255,.15);
backdrop-filter:blur(15px);
border-radius:20px;
box-shadow:0 0 30px rgba(0,0,0,.4);
color:white;
}

.login-box h1{
text-align:center;
margin-bottom:30px;
}

.login-box input{
width:100%;
padding:15px;
margin-bottom:20px;
border:none;
border-radius:10px;
font-size:16px;
outline:none;
}

.login-box button{
width:100%;
padding:15px;
border:none;
border-radius:30px;
background:#22c55e;
color:#fff;
font-size:18px;
cursor:pointer;
transition:.3s;
}

.login-box button:hover{
background:#16a34a;
}

.login-box p{
margin-top:20px;
text-align:center;
}

.login-box a{
color:#22c55e;
text-decoration:none;
font-weight:bold;
}

.demo-note{
margin-top:25px;
padding:18px;
background:rgba(255,255,255,.12);
border:1px solid rgba(255,255,255,.25);
border-radius:15px;
text-align:center;
}

.demo-note h3{
color:#22c55e;
margin-bottom:10px;
}

.demo-note p{
margin:6px 0;
font-size:15px;
}

</style>

</head>

<body>

<div class="login-container">

<div class="login-box">

<h1 style="color:red;">SHANTHAN TEST</h1>
<input type="email" placeholder="Enter Email">

<input type="password" placeholder="Enter Password">

<button onclick="window.location.href='dashboard.html'">
Login
</button>

<p>
Don't have an account?
<a href="register.html">Register</a>
</p>

<div class="demo-note">

<h3>Demo Login Credentials</h3>

<p><strong>Email:</strong> demo@plantai.com</p>

<p><strong>Password:</strong> demo123</p>

<p style="color:#d1d5db;">
Use these demo credentials to explore the application.
</p>

</div>

</div>

</div>

</body>
</html>
</div>
