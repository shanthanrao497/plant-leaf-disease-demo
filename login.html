<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Plant AI</title>

<link rel="stylesheet" href="css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
.login-container{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#14532d,#065f46);
}

.login-box{
width:400px;
padding:40px;
background:rgba(255,255,255,.15);
backdrop-filter:blur(15px);
border-radius:20px;
box-shadow:0 0 30px rgba(0,0,0,.4);
}

.login-box h1{
text-align:center;
margin-bottom:30px;
}

.login-box input{
width:100%;
padding:15px;
margin-bottom:20px;
border:none;
border-radius:10px;
font-size:16px;
}

.login-box button{
width:100%;
padding:15px;
border:none;
border-radius:30px;
background:#22c55e;
color:#fff;
font-size:18px;
cursor:pointer;
}

.login-box button:hover{
background:#16a34a;
}

.login-box p{
margin-top:20px;
text-align:center;
}

.login-box a{
color:#22c55e;
text-decoration:none;
font-weight:bold;
}
</style>

</head>

<body>

<div class="login-container">

<div class="login-box">

<h1>🌿 Login</h1>

<input type="email" placeholder="Email">

<input type="password" placeholder="Password">

<button onclick="window.location='dashboard.html'">
Login
</button>

<p>
Don't have an account?
<a href="register.html">Register</a>
</p>

</div>

</div>

</body>
</html>
